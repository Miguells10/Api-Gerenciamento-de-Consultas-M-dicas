name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  quality:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run Ruff check
        run: poetry run ruff check .

      - name: Check formatting with Black
        run: poetry run black --check .

  test:
    name: Automated Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: consultas_medicas_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "False"
      ALLOWED_HOSTS: localhost
      DB_NAME: consultas_medicas_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run tests with coverage
        run: poetry run coverage run manage.py test apps --verbosity=2

      - name: Report coverage
        run: poetry run coverage report --fail-under=80

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    environment:
      name: ${{ github.ref == 'refs/heads/master' && 'production' || 'staging' }}
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ github.ref == 'refs/heads/master' && secrets.EC2_HOST_PROD || secrets.EC2_HOST_STAGING }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Determine directory and secrets
            APP_DIR="Api-Gerenciamento-de-Consultas-Medicas"
            BRANCH="${{ github.ref_name }}"
            
            if [ ! -d "$APP_DIR" ]; then
                git clone https://github.com/Miguells10/Api-Gerenciamento-de-Consultas-Medicas.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            
            # Update .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > .env
            echo "DEBUG=False" >> .env
            echo "ALLOWED_HOSTS=${{ github.ref == 'refs/heads/master' && secrets.EC2_HOST_PROD || secrets.EC2_HOST_STAGING }},localhost,127.0.0.1" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_HOST=db" >> .env
            echo "DB_PORT=5432" >> .env
            
            # Restart with zero-downtime attempt (simple version: pull before restart)
            sudo docker compose pull
            sudo docker compose up -d --build
            sudo docker compose exec -T web python manage.py migrate
            sudo docker image prune -f
